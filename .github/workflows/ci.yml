name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    name: Build & Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --release --workspace

      - name: Run tests
        run: cargo test --release --workspace

      - name: Build FFI library
        run: cargo build --release -p axon-ffi

      - name: Verify CLI
        run: |
          mkdir -p output
          ./target/release/axon create --model "CI-Test" --architecture test output/test.axon
          ./target/release/axon validate output/test.axon
          ./target/release/axon list output/test.axon --verbose

      - name: Build C FFI example (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          gcc -o cffi_example examples/cffi_example.c \
            -I./include -L./target/release -laxon_ffi \
            -Wl,-rpath,./target/release
          ./cffi_example output/test.axon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: axon-${{ matrix.os }}
          path: |
            target/release/axon
            target/release/libaxon_ffi.so
            target/release/libaxon_ffi.dylib
            target/release/axon_ffi.dll
            target/release/libaxon_ffi.a
          retention-days: 7

  python-test:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build axon CLI
        run: cargo build --release -p axon-cli

      - name: Build FFI library
        run: cargo build --release -p axon-ffi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          pip install numpy
          pip install -e ./python

      - name: Test Python bindings
        run: |
          mkdir -p output
          ./target/release/axon create --model "PyTest" --architecture test output/pytest.axon
          python3 -c "
import axon
m = axon.load('output/pytest.axon')
print(m.summary())
assert m.tensor_count == 17
assert 'emb_weight' in m
print('Python bindings: OK')
"
